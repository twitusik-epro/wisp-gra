<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisp Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f0a;color:#b0ccb0;font-family:'Segoe UI',Arial,sans-serif;font-size:14px;}
header{background:#0d1a0d;border-bottom:1px solid #1e3a1e;padding:12px 24px;display:flex;align-items:center;gap:16px;}
header h1{color:#7de060;font-size:18px;font-weight:700;}
header .sub{color:#4a7a4a;font-size:12px;}
nav{display:flex;gap:2px;margin-left:auto;}
nav button{background:none;border:1px solid #2a4a2a;color:#7aaa7a;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s;}
nav button.active,nav button:hover{background:#1a3a1a;color:#a0e090;border-color:#4a7a4a;}
main{padding:20px 24px;max-width:1200px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.card{background:#0d1a0d;border:1px solid #1e3a1e;border-radius:10px;padding:16px;}
.card .val{font-size:28px;font-weight:700;color:#7de060;}
.card .lbl{font-size:12px;color:#4a7a4a;margin-top:4px;}
.card .sub2{font-size:11px;color:#3a6a3a;margin-top:2px;}
.section{display:none;}
.section.active{display:block;}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.toolbar input{background:#0d1a0d;border:1px solid #2a4a2a;color:#b0ccb0;padding:7px 12px;border-radius:6px;font-size:13px;width:260px;}
.toolbar input::placeholder{color:#3a6a3a;}
.toolbar input:focus{outline:none;border-color:#4a8a4a;}
.btn{background:#1a3a1a;border:1px solid #2e5e2e;color:#90d090;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s;}
.btn:hover{background:#243a24;color:#b0f0b0;}
.btn.red{background:#2a1010;border-color:#5e2e2e;color:#d09090;}
.btn.red:hover{background:#3a1818;}
.btn.blue{background:#101a2a;border-color:#2e4e6e;color:#90b0d0;}
.btn.blue:hover{background:#182430;}
.btn.sm{padding:4px 10px;font-size:12px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:8px 10px;color:#4a8a4a;font-size:12px;font-weight:600;border-bottom:1px solid #1e3a1e;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid #141e14;font-size:13px;vertical-align:middle;}
tr:hover td{background:#0f1e0f;}
td .actions{display:flex;gap:6px;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.badge.green{background:#1a3a1a;color:#70d070;}
.badge.orange{background:#2a2010;color:#d0a060;}
.badge.red{background:#2a1010;color:#d07070;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#0d1a0d;border:1px solid #2a4a2a;border-radius:12px;padding:24px;width:340px;}
.modal h3{color:#7de060;margin-bottom:16px;}
.modal label{display:block;font-size:12px;color:#4a7a4a;margin-bottom:4px;}
.modal input{width:100%;background:#080f08;border:1px solid #2a4a2a;color:#b0ccb0;padding:8px 12px;border-radius:6px;font-size:14px;margin-bottom:12px;}
.modal input:focus{outline:none;border-color:#4a8a4a;}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.toast{position:fixed;bottom:24px;right:24px;background:#1a4a1a;color:#90f090;border:1px solid #2a7a2a;border-radius:8px;padding:10px 18px;font-size:13px;z-index:200;animation:fadeIn .2s;display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.empty{color:#3a6a3a;text-align:center;padding:32px;font-style:italic;}
#refresh-time{font-size:11px;color:#2a4a2a;margin-left:auto;}
</style>
</head>
<body>
<header>
  <div>
    <h1>🌿 Wisp Admin</h1>
    <div class="sub">wispplay.com — panel zarządzania</div>
  </div>
  <nav>
    <button onclick="showSection('purchases')">💳 Zakupy</button>
  </nav>
</header>

<main>
  <!-- DASHBOARD -->
  <div id="section-dashboard" class="section active">
    <div class="cards" id="stat-cards">
      <div class="card"><div class="val" id="s-total">—</div><div class="lbl">Wszystkich graczy</div></div>
      <div class="card"><div class="val" id="s-7d">—</div><div class="lbl">Aktywnych (7 dni)</div></div>
      <div class="card"><div class="val" id="s-30d">—</div><div class="lbl">Aktywnych (30 dni)</div></div>
      <div class="card"><div class="val" id="s-new7d">—</div><div class="lbl">Nowych (7 dni)</div></div>
      <div class="card"><div class="val" id="s-revenue">—</div><div class="lbl">Przychód</div><div class="sub2" id="s-purchases">zakupy: —</div></div>
    </div>
    <div style="color:#3a6a3a;font-size:12px;margin-bottom:16px;" id="refresh-time"></div>

    <!-- Lista użytkowników bezpośrednio na dashboardzie -->
    <div class="toolbar">
      <input type="text" id="user-search" placeholder="Szukaj po nicku lub e-mailu…" oninput="searchUsers()">
      <button class="btn" onclick="loadUsers()">↺ Odśwież</button>
      <span id="user-count" style="color:#3a6a3a;font-size:12px;"></span>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Nick</th><th>E-mail</th><th>Poziom</th>
            <th>Wynik</th><th>Życia</th><th>Trudność</th>
            <th>Ostatnie logowanie</th><th>Dołączył</th><th>Akcje</th>
          </tr>
        </thead>
        <tbody id="user-table"></tbody>
      </table>
    </div>
  </div>

  <!-- USERS — ukryta (lista przeniesiona na dashboard) -->
  <div id="section-users" class="section"></div>

  <!-- PURCHASES -->
  <div id="section-purchases" class="section">
    <div class="toolbar">
      <button class="btn" onclick="loadPurchases()">↺ Odśwież</button>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Gracz</th><th>E-mail</th><th>Pakiet</th>
            <th>Życia</th><th>Kwota</th><th>Status</th><th>Data</th>
          </tr>
        </thead>
        <tbody id="purchase-table"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal: dodaj życia -->
<div class="modal-bg" id="modal-lives">
  <div class="modal">
    <h3>❤️ Ustaw życia</h3>
    <div id="modal-user-info" style="color:#4a8a4a;font-size:13px;margin-bottom:12px;"></div>
    <label>Nowa liczba żyć</label>
    <input type="number" id="modal-lives-val" min="0" max="9999" value="10">
    <label style="margin-top:4px;">Lub dodaj / odejmij (delta)</label>
    <input type="number" id="modal-lives-delta" placeholder="np. +5 lub -2">
    <div class="modal-btns">
      <button class="btn" onclick="submitLives()">✅ Zapisz</button>
      <button class="btn red" onclick="closeModal()">Anuluj</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let _editUserId = null;
let _searchTimer = null;
let _allUsers = [];

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  if (event && event.target) event.target.classList.add('active');
  if (name === 'purchases') loadPurchases();
}

async function apiFetch(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadStats() {
  try {
    const d = await apiFetch('/api/admin/stats');
    document.getElementById('s-total').textContent   = d.users.total;
    document.getElementById('s-7d').textContent      = d.users.active_7d;
    document.getElementById('s-30d').textContent     = d.users.active_30d;
    document.getElementById('s-new7d').textContent   = d.users.new_7d;
    const rev = (d.purchases.revenue_gr / 100).toFixed(2);
    document.getElementById('s-revenue').textContent = rev + ' €';
    document.getElementById('s-purchases').textContent = `zakupy: ${d.purchases.completed} / ${d.purchases.total}`;
    document.getElementById('refresh-time').textContent = 'Odświeżono: ' + new Date().toLocaleTimeString('pl-PL');
  } catch(e) { showToast('Błąd ładowania statystyk', true); }
}

async function loadUsers(q) {
  try {
    const url = q ? `/api/admin/users?q=${encodeURIComponent(q)}` : '/api/admin/users';
    _allUsers = await apiFetch(url);
    renderUsers(_allUsers);
    document.getElementById('user-count').textContent = `${_allUsers.length} użytkowników`;
  } catch(e) { showToast('Błąd ładowania użytkowników', true); }
}

function renderUsers(users) {
  const tb = document.getElementById('user-table');
  if (!users.length) { tb.innerHTML = '<tr><td colspan="10" class="empty">Brak użytkowników</td></tr>'; return; }
  tb.innerHTML = users.map(u => `
    <tr>
      <td style="color:#3a6a3a">${u.id}</td>
      <td><strong style="color:#90d090">${esc(u.nick || '—')}</strong></td>
      <td style="color:#6a9a6a">${esc(u.email || '—')}</td>
      <td>${u.level}</td>
      <td>⭐${u.score}</td>
      <td>❤️ ${u.lives}</td>
      <td><span class="badge ${u.difficulty==='hard'?'red':u.difficulty==='easy'?'green':'orange'}">${u.difficulty||'—'}</span></td>
      <td style="color:#4a7a4a;font-size:12px">${fmtDate(u.last_login)}</td>
      <td style="color:#4a7a4a;font-size:12px">${fmtDate(u.created_at)}</td>
      <td><div class="actions">
        <button class="btn sm blue" onclick="openLivesModal(${u.id},'${esc(u.nick||u.email)}',${u.lives})">❤️ Życia</button>
        <button class="btn sm red" onclick="deleteUser(${u.id},'${esc(u.nick||u.email)}')">🗑️</button>
      </div></td>
    </tr>`).join('');
}

function searchUsers() {
  clearTimeout(_searchTimer);
  const q = document.getElementById('user-search').value.trim();
  if (q.length === 0) { renderUsers(_allUsers); return; }
  _searchTimer = setTimeout(() => loadUsers(q), 400);
}

async function loadPurchases() {
  try {
    const rows = await apiFetch('/api/admin/purchases');
    const tb = document.getElementById('purchase-table');
    if (!rows.length) { tb.innerHTML = '<tr><td colspan="8" class="empty">Brak transakcji</td></tr>'; return; }
    tb.innerHTML = rows.map(p => `
      <tr>
        <td style="color:#3a6a3a">${p.id}</td>
        <td><strong style="color:#90d090">${esc(p.nick||'—')}</strong></td>
        <td style="color:#6a9a6a;font-size:12px">${esc(p.email||'—')}</td>
        <td>${p.package_id||'—'}</td>
        <td>❤️ ${p.lives}</td>
        <td>${(p.amount_pln_gr/100).toFixed(2)} €</td>
        <td><span class="badge ${p.status==='completed'?'green':p.status==='pending'?'orange':'red'}">${p.status}</span></td>
        <td style="color:#4a7a4a;font-size:12px">${fmtDate(p.created_at)}</td>
      </tr>`).join('');
  } catch(e) { showToast('Błąd ładowania zakupów', true); }
}

function openLivesModal(id, nick, currentLives) {
  _editUserId = id;
  document.getElementById('modal-user-info').textContent = `Gracz: ${nick} | Obecne życia: ${currentLives}`;
  document.getElementById('modal-lives-val').value = currentLives;
  document.getElementById('modal-lives-delta').value = '';
  document.getElementById('modal-lives').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-lives').classList.remove('open');
  _editUserId = null;
}

async function submitLives() {
  if (!_editUserId) return;
  const livesVal = document.getElementById('modal-lives-val').value;
  const deltaVal = document.getElementById('modal-lives-delta').value;
  const body = deltaVal !== '' ? { delta: parseInt(deltaVal) } : { lives: parseInt(livesVal) };
  try {
    const r = await apiFetch(`/api/admin/users/${_editUserId}/lives`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    showToast(`✅ Życia zaktualizowane: ${r.lives}`);
    closeModal();
    loadUsers(document.getElementById('user-search').value.trim() || undefined);
  } catch(e) { showToast('Błąd: ' + e.message, true); }
}

async function deleteUser(id, nick) {
  if (!confirm(`Usunąć konto gracza "${nick}" (ID: ${id})?\nTa operacja jest nieodwracalna.`)) return;
  try {
    await apiFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
    showToast(`🗑️ Konto ${nick} usunięte`);
    loadUsers(document.getElementById('user-search').value.trim() || undefined);
  } catch(e) { showToast('Błąd: ' + e.message, true); }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#2a1010' : '#1a4a1a';
  t.style.color = isError ? '#f09090' : '#90f090';
  t.style.borderColor = isError ? '#5a2020' : '#2a7a2a';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('pl-PL', { dateStyle:'short', timeStyle:'short' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Zamknij modal klikając tło
document.getElementById('modal-lives').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Klawisz Enter w modalu
document.getElementById('modal-lives-val').addEventListener('keydown', e => { if(e.key==='Enter') submitLives(); });
document.getElementById('modal-lives-delta').addEventListener('keydown', e => { if(e.key==='Enter') submitLives(); });

// Start
loadStats();
loadUsers();

// Auto-odświeżanie co 60 sekund
setInterval(() => {
  const active = document.querySelector('.section.active');
  if(!active) return;
  if(active.id === 'section-dashboard') { loadStats(); loadUsers(); }
  else if(active.id === 'section-purchases') loadPurchases();
}, 60000);
</script>
</body>
</html>

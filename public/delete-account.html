<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Account — Wisp: Spirit of the Forest</title>
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://wispplay.com/delete-account.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040a04;color:#c0d8b0;font-family:'Segoe UI',Arial,sans-serif;font-size:15px;line-height:1.7;padding:0 16px 60px;min-height:100vh;display:flex;flex-direction:column;}
.wrap{max-width:480px;margin:0 auto;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 0;}
.back{color:#6abf5e;text-decoration:none;font-size:13px;align-self:flex-start;margin-bottom:40px;}
.back:hover{color:#90df70;}
#delete-btn{width:100%;padding:20px;background:#8a1010;color:#ffd0d0;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;transition:background .2s;}
#delete-btn:hover{background:#aa1818;}
#delete-btn:disabled{background:#3a1010;color:#804040;cursor:default;}
#msg{margin-top:20px;font-size:14px;color:#a08080;text-align:center;min-height:24px;}
footer{text-align:center;padding:20px 16px;border-top:1px solid #1a3a1a;font-size:12px;color:#4a7a4a;}
footer a{color:#4a7a4a;}
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="back">← Wisp: Spirit of the Forest</a>
  <button id="delete-btn">🗑 Delete my account permanently</button>
  <div id="msg"></div>
</div>

<footer>
  &copy; 2026 ePro sp. z o.o. &nbsp;·&nbsp; <a href="/privacy.html">Privacy Policy</a> &nbsp;·&nbsp; <a href="/terms.html">Terms</a> &nbsp;·&nbsp; <a href="/delete-account.html">Delete Account</a> &nbsp;·&nbsp; <a href="/">Wisp: Spirit of the Forest</a>
</footer>

<script>
const btn = document.getElementById('delete-btn');
const msg = document.getElementById('msg');
const token = localStorage.getItem('wisp_jwt');

if (!token) {
  btn.disabled = true;
  btn.textContent = '🗑 Delete my account permanently';
  msg.textContent = 'You are not logged in — you have no account to delete.';
  msg.style.color = '#6a8a6a';
}

btn.addEventListener('click', async () => {
  if (!token) return;
  if (!confirm('Are you sure? This will permanently delete your account, progress, and all remaining lives.')) return;
  btn.disabled = true;
  btn.textContent = 'Deleting...';
  try {
    const r = await fetch('/api/account', {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (r.ok) {
      localStorage.removeItem('wisp_jwt');
      btn.textContent = '✓ Account deleted';
      msg.textContent = 'Your account has been permanently deleted. Goodbye!';
      msg.style.color = '#6abf5e';
      setTimeout(() => { location.href = '/'; }, 3000);
    } else {
      btn.disabled = false;
      btn.textContent = '🗑 Delete my account permanently';
      msg.textContent = 'Something went wrong. Please try again.';
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '🗑 Delete my account permanently';
    msg.textContent = 'Connection error. Please try again.';
  }
});
</script>
</body>
</html>
